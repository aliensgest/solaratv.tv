<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blog Manager | Admin - SOLARA TV</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous">
  <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>

  <div class="dashboard-layout">
    <aside class="sidebar" id="sidebar">
      <a href="/" class="logo">SOLARA TV</a>
      <nav class="sidebar-nav">
        <a href="index.html"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
        <a href="blog-editor.html" class="active"><i class="fas fa-pen-fancy"></i> Blog Manager</a>
        <a href="analytics.html"><i class="fas fa-chart-line"></i> Analytics</a>
        <a href="users.html"><i class="fas fa-users"></i> Users</a>
        <div class="sidebar-divider"></div>
        <a href="/"><i class="fas fa-globe"></i> View Site</a>
        <a href="#" onclick="Auth.logout();return false;"><i class="fas fa-sign-out-alt"></i> Logout</a>
      </nav>
    </aside>

    <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

    <main class="dashboard-main">
      <div class="dashboard-header">
        <div style="display:flex;align-items:center;gap:12px;">
          <button class="hamburger" onclick="toggleSidebar()" style="display:none;" id="sidebarToggle"><i class="fas fa-bars"></i></button>
          <h1>Blog Manager</h1>
        </div>
        <button class="btn btn-primary btn-sm" onclick="showEditor()"><i class="fas fa-plus"></i> New Post</button>
      </div>

      <!-- Blog List View -->
      <div id="blogListView">
        <table class="data-table">
          <thead>
            <tr>
              <th>Title</th>
              <th>Category</th>
              <th>Status</th>
              <th>Date</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="blogTable"></tbody>
        </table>
      </div>

      <!-- Blog Editor View -->
      <div id="blogEditorView" class="hidden">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;">
          <h2 id="editorTitle">New Blog Post</h2>
          <button class="btn btn-outline btn-sm" onclick="showList()"><i class="fas fa-arrow-left"></i> Back to List</button>
        </div>

        <form id="blogForm" onsubmit="return saveBlog(event)">
          <input type="hidden" id="blogId">
          
          <div class="form-group">
            <label for="postTitle">Title</label>
            <input type="text" id="postTitle" placeholder="Enter blog post title" required>
          </div>

          <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">
            <div class="form-group">
              <label for="postCategory">Category</label>
              <select id="postCategory">
                <option value="IPTV Guide">IPTV Guide</option>
                <option value="Tutorial">Tutorial</option>
                <option value="Comparison">Comparison</option>
                <option value="News">News</option>
                <option value="Tips">Tips & Tricks</option>
              </select>
            </div>
            <div class="form-group">
              <label for="postStatus">Status</label>
              <select id="postStatus">
                <option value="draft">Draft</option>
                <option value="published">Published</option>
              </select>
            </div>
          </div>

          <div class="form-group">
            <label for="postImage">Image URL</label>
            <input type="url" id="postImage" placeholder="https://images.unsplash.com/...">
          </div>

          <div class="form-group">
            <label for="postExcerpt">Excerpt (SEO Description)</label>
            <textarea id="postExcerpt" rows="2" placeholder="Brief summary for search engines and blog cards..."></textarea>
          </div>

          <div class="form-group">
            <label>Content</label>
            <div class="editor-toolbar">
              <button type="button" onclick="execCmd('bold')" title="Bold"><i class="fas fa-bold"></i></button>
              <button type="button" onclick="execCmd('italic')" title="Italic"><i class="fas fa-italic"></i></button>
              <button type="button" onclick="execCmd('underline')" title="Underline"><i class="fas fa-underline"></i></button>
              <button type="button" onclick="execCmd('insertOrderedList')" title="Ordered List"><i class="fas fa-list-ol"></i></button>
              <button type="button" onclick="execCmd('insertUnorderedList')" title="Unordered List"><i class="fas fa-list-ul"></i></button>
              <button type="button" onclick="insertHeading()" title="Heading"><i class="fas fa-heading"></i></button>
              <button type="button" onclick="execCmd('formatBlock', 'blockquote')" title="Quote"><i class="fas fa-quote-right"></i></button>
              <button type="button" onclick="insertLink()" title="Link"><i class="fas fa-link"></i></button>
            </div>
            <div class="editor-content" id="postContent" contenteditable="true"></div>
          </div>

          <div class="form-group">
            <label for="postTags">Tags (comma-separated)</label>
            <input type="text" id="postTags" placeholder="IPTV, Streaming, 4K, Guide">
          </div>

          <div style="display:flex;gap:12px;margin-top:16px;">
            <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> Save Post</button>
            <button type="button" class="btn btn-outline" onclick="showList()">Cancel</button>
          </div>
        </form>
      </div>
    </main>
  </div>

  <script src="../assets/js/auth.js"></script>
  <script src="../assets/js/analytics.js"></script>
  <script src="../assets/js/blog.js"></script>
  <script>
    if (!Auth.requireAuth('admin')) {
      document.body.innerHTML = '';
    }

    let editingId = null;

    function loadBlogList() {
      const blogs = Blog.getAll().sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
      const table = document.getElementById('blogTable');
      
      if (blogs.length === 0) {
        table.innerHTML = '<tr><td colspan="5" style="text-align:center;padding:40px;">No blog posts yet. Click "New Post" to create one.</td></tr>';
        return;
      }

      table.innerHTML = blogs.map(b => {
        const statusClass = b.status === 'published' ? 'badge-published' : 'badge-draft';
        const date = new Date(b.createdAt).toLocaleDateString();
        return '<tr>' +
          '<td><strong>' + escapeHtml(b.title) + '</strong></td>' +
          '<td>' + escapeHtml(b.category) + '</td>' +
          '<td><span class="badge ' + statusClass + '">' + b.status + '</span></td>' +
          '<td>' + date + '</td>' +
          '<td>' +
            '<button class="btn btn-sm btn-outline" style="padding:4px 12px;margin-right:6px;" onclick="editBlog(\'' + b.id + '\')"><i class="fas fa-edit"></i></button>' +
            '<button class="btn btn-sm" style="padding:4px 12px;background:rgba(255,77,77,0.1);color:#ff4d4d;border:1px solid rgba(255,77,77,0.3);border-radius:8px;" onclick="deleteBlog(\'' + b.id + '\')"><i class="fas fa-trash"></i></button>' +
          '</td></tr>';
      }).join('');
    }

    function showEditor(id) {
      document.getElementById('blogListView').classList.add('hidden');
      document.getElementById('blogEditorView').classList.remove('hidden');
      
      if (id) {
        editingId = id;
        const blog = Blog.getById(id);
        document.getElementById('editorTitle').textContent = 'Edit Post';
        document.getElementById('blogId').value = blog.id;
        document.getElementById('postTitle').value = blog.title;
        document.getElementById('postCategory').value = blog.category;
        document.getElementById('postStatus').value = blog.status;
        document.getElementById('postImage').value = blog.image;
        document.getElementById('postExcerpt').value = blog.excerpt;
        document.getElementById('postContent').innerHTML = blog.content;
        document.getElementById('postTags').value = (blog.tags || []).join(', ');
      } else {
        editingId = null;
        document.getElementById('editorTitle').textContent = 'New Blog Post';
        document.getElementById('blogForm').reset();
        document.getElementById('postContent').innerHTML = '';
        document.getElementById('blogId').value = '';
      }
    }

    function showList() {
      document.getElementById('blogListView').classList.remove('hidden');
      document.getElementById('blogEditorView').classList.add('hidden');
      editingId = null;
      loadBlogList();
    }

    function saveBlog(e) {
      e.preventDefault();
      const data = {
        title: document.getElementById('postTitle').value.trim(),
        category: document.getElementById('postCategory').value,
        status: document.getElementById('postStatus').value,
        image: document.getElementById('postImage').value.trim() || undefined,
        excerpt: document.getElementById('postExcerpt').value.trim(),
        content: document.getElementById('postContent').innerHTML,
        tags: document.getElementById('postTags').value.split(',').map(t => t.trim()).filter(Boolean)
      };

      if (!data.title || !data.content) {
        alert('Title and content are required.');
        return false;
      }

      if (editingId) {
        Blog.update(editingId, data);
      } else {
        Blog.create(data);
      }

      showList();
      return false;
    }

    function editBlog(id) {
      showEditor(id);
    }

    function deleteBlog(id) {
      if (confirm('Are you sure you want to delete this post?')) {
        Blog.delete(id);
        loadBlogList();
      }
    }

    // Rich text editor commands
    function execCmd(cmd, value) {
      document.execCommand(cmd, false, value || null);
      document.getElementById('postContent').focus();
    }

    function insertHeading() {
      execCmd('formatBlock', 'h2');
    }

    function insertLink() {
      const url = prompt('Enter URL:');
      if (url) execCmd('createLink', url);
    }

    function toggleSidebar() {
      document.getElementById('sidebar').classList.toggle('open');
      document.getElementById('sidebarOverlay').classList.toggle('active');
    }

    if (window.innerWidth <= 992) {
      document.getElementById('sidebarToggle').style.display = 'inline-block';
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    // Initial load
    loadBlogList();
  </script>
</body>
</html>
