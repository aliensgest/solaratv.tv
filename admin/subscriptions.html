<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Subscriptions | Admin - SOLARA TV</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous">
  <link rel="stylesheet" href="../assets/css/style.css">
  <style>
    .action-tabs{display:flex;gap:8px;margin-bottom:24px;flex-wrap:wrap}
    .action-tab{padding:10px 24px;background:var(--bg-card);border:1px solid var(--border);color:var(--text-muted);border-radius:var(--radius-full);cursor:pointer;font-weight:600;transition:var(--transition);font-size:.9rem}
    .action-tab.active,.action-tab:hover{background:var(--gradient);color:var(--text-dark);border-color:transparent}
    .action-panel{display:none;background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:30px}
    .action-panel.active{display:block;animation:fadeUp .3s ease}
    .form-row{display:grid;grid-template-columns:1fr 1fr;gap:16px}
    .result-box{margin-top:20px;padding:20px;border-radius:var(--radius-sm);display:none;word-break:break-all}
    .result-box.success{display:block;background:rgba(37,211,102,.1);border:1px solid rgba(37,211,102,.3);color:#25D366}
    .result-box.error{display:block;background:rgba(255,77,77,.1);border:1px solid rgba(255,77,77,.3);color:#ff6b6b}
    .result-box .url-display{background:rgba(0,0,0,.3);padding:10px;border-radius:6px;margin-top:10px;font-family:monospace;font-size:.85rem;color:#fff;user-select:all}
    .copy-btn{padding:6px 14px;border-radius:6px;background:rgba(254,246,75,.1);border:1px solid var(--border);color:var(--primary);cursor:pointer;font-size:.8rem;margin-top:8px;transition:var(--transition)}
    .copy-btn:hover{background:var(--primary);color:var(--text-dark)}
    .history-section{margin-top:30px}
    @media(max-width:768px){.form-row{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <div class="dashboard-layout">
    <aside class="sidebar" id="sidebar">
      <a href="../index.html" class="logo">SOLARA TV</a>
      <nav class="sidebar-nav">
        <a href="index.html"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
        <a href="subscriptions.html" class="active"><i class="fas fa-ticket-alt"></i> Subscriptions</a>
        <a href="device-lookup.html"><i class="fas fa-search"></i> Device Lookup</a>
        <a href="blog-editor.html"><i class="fas fa-pen-fancy"></i> Blog Manager</a>
        <a href="analytics.html"><i class="fas fa-chart-line"></i> Analytics</a>
        <a href="users.html"><i class="fas fa-users"></i> Users</a>
        <a href="api-settings.html"><i class="fas fa-cog"></i> API Settings</a>
        <div class="sidebar-divider"></div>
        <a href="../index.html"><i class="fas fa-globe"></i> View Site</a>
        <a href="#" onclick="Auth.logout();return false;"><i class="fas fa-sign-out-alt"></i> Logout</a>
      </nav>
    </aside>
    <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

    <main class="dashboard-main">
      <div class="dashboard-header">
        <div style="display:flex;align-items:center;gap:12px;">
          <button class="hamburger" onclick="toggleSidebar()" style="display:none;" id="sidebarToggle"><i class="fas fa-bars"></i></button>
          <h1>Subscriptions</h1>
        </div>
        <div class="user-info">
          <span id="creditsDisplay" style="background:rgba(254,246,75,.1);padding:8px 16px;border-radius:var(--radius-full);font-weight:600;color:var(--primary);font-size:.9rem;"><i class="fas fa-coins"></i> Credits: —</span>
        </div>
      </div>

      <!-- Action Tabs -->
      <div class="action-tabs">
        <div class="action-tab active" data-panel="newSub">+ New Subscription</div>
        <div class="action-tab" data-panel="renewSub">Renew Subscription</div>
      </div>

      <!-- NEW SUBSCRIPTION PANEL -->
      <div class="action-panel active" id="newSub">
        <h3 style="margin-bottom:20px;"><i class="fas fa-plus-circle" style="color:var(--primary);margin-right:8px;"></i> Create New Subscription</h3>
        <form id="newSubForm">
          <div class="form-row">
            <div class="form-group">
              <label>Device Type</label>
              <select id="newType" onchange="toggleMacField()">
                <option value="m3u">M3U (IPTV Player)</option>
                <option value="mag">MAG (STB Device)</option>
                <option value="protocol">Protocol</option>
              </select>
            </div>
            <div class="form-group">
              <label>Subscription Length</label>
              <select id="newSub">
                <option value="99">Demo (Free Trial)</option>
                <option value="1">1 Month</option>
                <option value="3">3 Months</option>
                <option value="6">6 Months</option>
                <option value="12" selected>12 Months</option>
              </select>
            </div>
          </div>
          <div class="form-row">
            <div class="form-group" id="macFieldNew" style="display:none;">
              <label>MAC Address</label>
              <input type="text" id="newMac" placeholder="XX:XX:XX:XX:XX:XX">
            </div>
            <div class="form-group">
              <label>Package</label>
              <select id="newPack"><option value="all">All Bouquets</option></select>
            </div>
          </div>
          <div class="form-group">
            <label>Note (optional)</label>
            <input type="text" id="newNote" placeholder="Customer name, order reference...">
          </div>
          <button type="submit" class="btn btn-primary"><i class="fas fa-rocket"></i> Create Subscription</button>
        </form>
        <div class="result-box" id="newResult"></div>
      </div>

      <!-- RENEW PANEL -->
      <div class="action-panel" id="renewSub">
        <h3 style="margin-bottom:20px;"><i class="fas fa-sync-alt" style="color:var(--primary);margin-right:8px;"></i> Renew Subscription</h3>
        <form id="renewForm">
          <div class="form-row">
            <div class="form-group">
              <label>Device Type</label>
              <select id="renewType" onchange="toggleRenewFields()">
                <option value="m3u">M3U</option>
                <option value="mag">MAG</option>
              </select>
            </div>
            <div class="form-group">
              <label>Subscription Length</label>
              <select id="renewSubLen">
                <option value="1">1 Month</option>
                <option value="3">3 Months</option>
                <option value="6">6 Months</option>
                <option value="12" selected>12 Months</option>
              </select>
            </div>
          </div>
          <div id="renewM3UFields">
            <div class="form-row">
              <div class="form-group">
                <label>Username</label>
                <input type="text" id="renewUsername" placeholder="M3U username">
              </div>
              <div class="form-group">
                <label>Password</label>
                <input type="text" id="renewPassword" placeholder="M3U password">
              </div>
            </div>
          </div>
          <div id="renewMAGFields" style="display:none;">
            <div class="form-group">
              <label>MAC Address</label>
              <input type="text" id="renewMac" placeholder="XX:XX:XX:XX:XX:XX">
            </div>
          </div>
          <button type="submit" class="btn btn-primary"><i class="fas fa-sync-alt"></i> Renew</button>
        </form>
        <div class="result-box" id="renewResult"></div>
      </div>

      <!-- HISTORY -->
      <div class="history-section">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
          <h3><i class="fas fa-history" style="color:var(--primary);margin-right:8px;"></i> Recent Activity</h3>
          <button class="btn btn-outline btn-sm" onclick="if(confirm('Clear subscription history?')){ActivationAPI.clearHistory();loadHistory();}"><i class="fas fa-trash"></i> Clear</button>
        </div>
        <table class="data-table">
          <thead><tr><th>Date</th><th>Action</th><th>Type</th><th>Details</th><th>Status</th></tr></thead>
          <tbody id="historyTable"><tr><td colspan="5" style="text-align:center;">No activity yet</td></tr></tbody>
        </table>
      </div>
    </main>
  </div>

  <script src="../assets/js/auth.js"></script>
  <script src="../assets/js/activation-api.js"></script>
  <script>
    if (!Auth.requireAuth('admin')) document.body.innerHTML = '';

    // Tab switching
    document.querySelectorAll('.action-tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.action-tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.action-panel').forEach(p => p.classList.remove('active'));
        tab.classList.add('active');
        document.getElementById(tab.dataset.panel).classList.add('active');
      });
    });

    // Load bouquets + credits
    async function initPage() {
      const bouquets = await ActivationAPI.getBouquets();
      const select = document.getElementById('newPack');
      if (Array.isArray(bouquets) && bouquets.length) {
        bouquets.forEach(b => {
          const opt = document.createElement('option');
          opt.value = b.id;
          opt.textContent = b.name;
          select.appendChild(opt);
        });
      }
      const info = await ActivationAPI.getResellerInfo();
      if (info && info.status === 'true') {
        document.getElementById('creditsDisplay').innerHTML = '<i class="fas fa-coins"></i> Credits: ' + escapeHtml(info.credits);
      }
      loadHistory();
    }

    function toggleMacField() {
      const t = document.getElementById('newType').value;
      document.getElementById('macFieldNew').style.display = t === 'mag' ? 'block' : 'none';
    }

    function toggleRenewFields() {
      const t = document.getElementById('renewType').value;
      document.getElementById('renewM3UFields').style.display = t === 'm3u' ? 'block' : 'none';
      document.getElementById('renewMAGFields').style.display = t === 'mag' ? 'block' : 'none';
    }

    // NEW SUBSCRIPTION
    document.getElementById('newSubForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      const type = document.getElementById('newType').value;
      const sub = document.getElementById('newSub').value;
      const pack = document.getElementById('newPack').value;
      const note = document.getElementById('newNote').value.trim();
      const box = document.getElementById('newResult');
      box.className = 'result-box';
      box.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Creating subscription...';
      box.classList.add('success');

      let result;
      if (type === 'm3u') {
        result = await ActivationAPI.addM3U(sub, pack, note);
      } else if (type === 'mag') {
        const mac = document.getElementById('newMac').value.trim();
        if (!mac) { showError(box, 'MAC address is required for MAG devices.'); return; }
        result = await ActivationAPI.addMAG(mac, sub, pack, note);
      } else {
        result = await ActivationAPI.addProtocol(sub, pack);
      }

      if (result.status === 'true') {
        let html = '<strong><i class="fas fa-check-circle"></i> ' + escapeHtml(result.message || 'Success') + '</strong>';
        if (result.url) html += '<div class="url-display">' + escapeHtml(result.url) + '</div><button class="copy-btn" onclick="copyText(\'' + escapeHtml(result.url).replace(/'/g, "\\'") + '\')"><i class="fas fa-copy"></i> Copy URL</button>';
        if (result.code) html += '<div class="url-display">Code: ' + escapeHtml(result.code) + '</div><button class="copy-btn" onclick="copyText(\'' + escapeHtml(result.code) + '\')"><i class="fas fa-copy"></i> Copy Code</button>';
        if (result.user_id) html += '<p style="margin-top:8px;font-size:.85rem;">User ID: ' + escapeHtml(result.user_id) + '</p>';
        box.className = 'result-box success';
        box.innerHTML = html;
        ActivationAPI.addToHistory({ action: 'new', type, sub, status: 'success', message: result.message, url: result.url || result.code || '' });
      } else {
        showError(box, result.message || 'Failed to create subscription.');
        ActivationAPI.addToHistory({ action: 'new', type, sub, status: 'failed', message: result.message });
      }
      loadHistory();
      refreshCredits();
    });

    // RENEW
    document.getElementById('renewForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      const type = document.getElementById('renewType').value;
      const sub = document.getElementById('renewSubLen').value;
      const box = document.getElementById('renewResult');
      box.className = 'result-box';
      box.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Renewing...';
      box.classList.add('success');

      let result;
      if (type === 'm3u') {
        const u = document.getElementById('renewUsername').value.trim();
        const p = document.getElementById('renewPassword').value.trim();
        if (!u || !p) { showError(box, 'Username and password are required.'); return; }
        result = await ActivationAPI.renewM3U(u, p, sub);
      } else {
        const mac = document.getElementById('renewMac').value.trim();
        if (!mac) { showError(box, 'MAC address is required.'); return; }
        result = await ActivationAPI.renewMAG(mac, sub);
      }

      if (result.status === 'true') {
        box.className = 'result-box success';
        box.innerHTML = '<strong><i class="fas fa-check-circle"></i> ' + escapeHtml(result.messasge || result.message || 'Renewal successful') + '</strong>';
        ActivationAPI.addToHistory({ action: 'renew', type, sub, status: 'success', message: result.messasge || result.message });
      } else {
        showError(box, result.message || 'Renewal failed.');
        ActivationAPI.addToHistory({ action: 'renew', type, sub, status: 'failed', message: result.message });
      }
      loadHistory();
      refreshCredits();
    });

    function showError(box, msg) {
      box.className = 'result-box error';
      box.innerHTML = '<strong><i class="fas fa-exclamation-triangle"></i> ' + escapeHtml(msg) + '</strong>';
    }

    async function refreshCredits() {
      const info = await ActivationAPI.getResellerInfo();
      if (info && info.status === 'true') {
        document.getElementById('creditsDisplay').innerHTML = '<i class="fas fa-coins"></i> Credits: ' + escapeHtml(info.credits);
      }
    }

    function loadHistory() {
      const history = ActivationAPI.getHistory();
      const table = document.getElementById('historyTable');
      if (!history.length) {
        table.innerHTML = '<tr><td colspan="5" style="text-align:center;">No activity yet</td></tr>';
        return;
      }
      table.innerHTML = history.slice(0, 50).map(h => {
        const date = new Date(h.date).toLocaleString();
        const statusClass = h.status === 'success' ? 'badge-published' : 'badge-draft';
        const details = h.url ? escapeHtml(String(h.url).substring(0, 60)) + '...' : escapeHtml(h.message || '—');
        return '<tr><td style="white-space:nowrap;">' + date + '</td><td><span class="badge ' + (h.action === 'new' ? 'badge-admin' : 'badge-client') + '">' + escapeHtml(h.action) + '</span></td><td>' + escapeHtml(h.type) + '</td><td style="max-width:250px;overflow:hidden;text-overflow:ellipsis;">' + details + '</td><td><span class="badge ' + statusClass + '">' + escapeHtml(h.status) + '</span></td></tr>';
      }).join('');
    }

    function copyText(text) {
      navigator.clipboard.writeText(text).then(() => {
        const btn = event.target.closest('.copy-btn');
        if (btn) { btn.innerHTML = '<i class="fas fa-check"></i> Copied!'; setTimeout(() => btn.innerHTML = '<i class="fas fa-copy"></i> Copy', 1500); }
      });
    }

    function toggleSidebar() {
      document.getElementById('sidebar').classList.toggle('open');
      document.getElementById('sidebarOverlay').classList.toggle('active');
    }
    if (window.innerWidth <= 992) document.getElementById('sidebarToggle').style.display = 'inline-block';

    function escapeHtml(text) { const d = document.createElement('div'); d.textContent = text; return d.innerHTML; }

    initPage();
  </script>
</body>
</html>
