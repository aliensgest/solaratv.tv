  <script>
    function loadBlogPosts() {
      const posts = Blog.getPublished();
      const grid = document.getElementById('blogGrid');
      const noPosts = document.getElementById('noPosts');

      if (posts.length === 0) {
        noPosts.classList.remove('hidden');
        return;
      }

      grid.innerHTML = posts.map(post => {
        const date = new Date(post.createdAt).toLocaleDateString('en', { year: 'numeric', month: 'long', day: 'numeric' });
        const excerpt = escapeHtml(post.excerpt || post.title).substring(0, 150);
        return '<article class="blog-card">' +
          '<img src="' + escapeHtml(post.image) + '" alt="' + escapeHtml(post.title) + '" class="blog-card-image" loading="lazy" onerror="this.src=\'https://images.unsplash.com/photo-1574375927938-d5a98e8ffe85?w=800\'">' +
          '<div class="blog-card-body">' +
            '<div class="blog-card-meta">' +
              '<span><i class="fas fa-folder"></i> ' + escapeHtml(post.category) + '</span>' +
              '<span><i class="fas fa-calendar"></i> ' + date + '</span>' +
            '</div>' +
            '<h3>' + escapeHtml(post.title) + '</h3>' +
            '<p>' + excerpt + '...</p>' +
            '<a href="blog-post.html?id=' + post.id + '" class="read-more">Read More <i class="fas fa-arrow-right"></i></a>' +
          '</div>' +
        '</article>';
      }).join('');
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text || '';
      return div.innerHTML;
    }

    loadBlogPosts();
  </script>
