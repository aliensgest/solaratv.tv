<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | SOLARA TV - Premium IPTV 4K Service</title>
  <meta name="description" content="Login to your SOLARA TV account. Access your premium IPTV dashboard, manage your subscription, and more.">
  <meta name="robots" content="noindex, nofollow">
  <link rel="canonical" href="https://solaratv.tv/login.html">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous">
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

  <div class="auth-page">
    <div class="auth-box">
      <a href="/" class="logo">SOLARA TV</a>
      <h2>Welcome Back</h2>
      <p class="subtitle">Sign in to your account</p>

      <div id="alertBox" class="alert alert-error"></div>

      <form id="loginForm" onsubmit="return handleLogin(event)">
        <div class="form-group">
          <label for="username">Username or Email</label>
          <input type="text" id="username" name="username" placeholder="Enter your username or email" required autocomplete="username">
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="Enter your password" required autocomplete="current-password">
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;margin-top:8px;">
          <i class="fas fa-sign-in-alt"></i> Sign In
        </button>
      </form>

      <div style="text-align:center;margin-top:24px;color:var(--text-muted);font-size:0.9rem;">
        <p>Don't have an account? <a href="register.html" style="color:var(--primary);font-weight:600;">Sign Up</a></p>
        <p style="margin-top:16px;"><a href="/" style="color:var(--text-muted);">&larr; Back to Home</a></p>
      </div>

      <div style="text-align:center;margin-top:24px;padding-top:20px;border-top:1px solid var(--border);">
        <p style="color:#666;font-size:0.82rem;">Admin: admin / SolaraAdmin2026!</p>
      </div>
    </div>
  </div>

  <script src="assets/js/auth.js"></script>
  <script src="assets/js/analytics.js"></script>
  <script>
    // Redirect if already logged in
    if (Auth.isLoggedIn()) {
      const session = Auth.getSession();
      window.location.href = session.role === 'admin' ? 'admin/' : 'client/';
    }

    async function handleLogin(e) {
      e.preventDefault();
      const alertBox = document.getElementById('alertBox');
      alertBox.style.display = 'none';

      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;

      if (!username || !password) {
        alertBox.textContent = 'Please fill in all fields.';
        alertBox.style.display = 'block';
        return false;
      }

      const result = await Auth.login(username, password);
      if (result.success) {
        window.location.href = result.session.role === 'admin' ? 'admin/' : 'client/';
      } else {
        alertBox.textContent = result.message;
        alertBox.style.display = 'block';
      }
      return false;
    }
  </script>
</body>
</html>
