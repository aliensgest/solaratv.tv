<!DOCTYPE html>

<script>
// حل شامل لإزالة .html من جميع الصفحات والروابط
(function() {
  // إصلاح الرابط الحالي
  if (location.pathname.endsWith('.html')) {
    history.replaceState({}, '', location.pathname.replace('.html', ''));
  }
  
  // إصلاح جميع الروابط في الصفحة
  for (let link of document.querySelectorAll('a[href]')) {
    let href = link.getAttribute('href');
    if (href && href.includes('.html') && !href.includes('://')) {
      link.setAttribute('href', href.replace('.html', ''));
    }
  }
})();
</script>

<script src="assets/js/auth.js"></script>
<script>
  document.getElementById('registerForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    const name = document.getElementById('regName').value.trim();
    const email = document.getElementById('regEmail').value.trim();
    const password = document.getElementById('regPassword').value;
    const confirm = document.getElementById('regConfirm').value;
    const errEl = document.getElementById('errorMsg');
    const succEl = document.getElementById('successMsg');
    errEl.style.display = 'none'; succEl.style.display = 'none';
    if (password !== confirm) { errEl.textContent = 'Passwords do not match'; errEl.style.display = 'block'; return; }
    if (typeof Auth !== 'undefined') {
      const result = await Auth.register(name, email, password);
      if (result.success) { succEl.textContent = 'Account created! Redirecting to login...'; succEl.style.display = 'block'; setTimeout(() => window.location.href = 'login.html', 1500); }
      else { errEl.textContent = result.message || 'Registration failed'; errEl.style.display = 'block'; }
    } else { errEl.textContent = 'Authentication system unavailable'; errEl.style.display = 'block'; }
  });
</script>
